<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Control Feria - Stock y Ventas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-dark text-light">
  <nav class="navbar navbar-dark bg-black border-bottom border-secondary sticky-top">
    <div class="container">
      <span class="navbar-brand fw-semibold">Control Feria</span>
      <div class="d-flex gap-2">
        <button id="btnNewDay" class="btn btn-sm btn-outline-warning">Nuevo día</button>
        <button id="btnResetAll" class="btn btn-sm btn-outline-danger">Borrar todo</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="row g-3">

      <!-- RESUMEN -->
      <div class="col-12">
        <div class="card bg-black border-secondary">
          <div class="card-body d-flex flex-wrap gap-3 align-items-center justify-content-between">
            <div>
              <div class="text-secondary small">Fecha</div>
              <div id="todayLabel" class="fw-semibold"></div>
            </div>
            <div>
              <div class="text-secondary small">Ventas (items)</div>
              <div id="soldItems" class="fw-semibold">0</div>
            </div>
            <div>
              <div class="text-secondary small">Total vendido</div>
              <div id="soldTotal" class="fw-semibold">$0</div>
            </div>
            <div class="d-flex align-items-end gap-2">
              <div>
                <div class="text-secondary small">Stock bajo (≤)</div>
                <input id="lowStock" class="form-control form-control-sm bg-dark text-light border-secondary"
                       type="number" min="0" step="1" value="3" style="max-width:90px;">
              </div>
              <button id="btnUndo" class="btn btn-sm btn-outline-info">Deshacer última venta</button>
            </div>
          </div>
        </div>
      </div>

      <!-- PRODUCTOS -->
      <div class="col-12 col-lg-6">
        <div class="card bg-black border-secondary h-100">
          <div class="card-body">
            <h2 class="h5 mb-3">Productos</h2>

            <form id="productForm" class="row g-2">
              <div class="col-12 col-md-4">
                <input id="pName" class="form-control form-control-sm" placeholder="Nombre (ej: Pan)" required />
              </div>
              <div class="col-6 col-md-3">
                <input id="pCode" class="form-control form-control-sm" placeholder="Código (opcional)" />
              </div>
              <div class="col-6 col-md-2">
                <input id="pPrice" class="form-control form-control-sm" type="number" min="0" step="0.01" placeholder="Precio" required />
              </div>
              <div class="col-6 col-md-2">
                <input id="pStock" class="form-control form-control-sm" type="number" min="0" step="1" placeholder="Stock" required />
              </div>
              <div class="col-6 col-md-1 d-grid">
                <button class="btn btn-sm btn-primary" type="submit">+</button>
              </div>
            </form>

            <div class="row g-2 mt-3">
              <div class="col-12 col-md-6">
                <input id="search" class="form-control form-control-sm" placeholder="Buscar por nombre..." />
              </div>
              <div class="col-12 col-md-6">
                <input id="searchCode" class="form-control form-control-sm" placeholder="Buscar por código (lector)..." />
              </div>
            </div>

            <div class="table-responsive mt-3">
              <table class="table table-dark table-sm align-middle mb-0">
                <thead>
                  <tr>
                    <th>Producto</th>
                    <th>Código</th>
                    <th class="text-end">Precio</th>
                    <th class="text-end">Stock</th>
                    <th class="text-end">Acciones</th>
                  </tr>
                </thead>
                <tbody id="productsTbody"></tbody>
              </table>
            </div>

            <div id="msg" class="alert alert-warning small mt-3 mb-0 d-none"></div>
          </div>
        </div>
      </div>

      <!-- REGISTRAR VENTA + INGRESO -->
      <div class="col-12 col-lg-6">
        <div class="card bg-black border-secondary">
          <div class="card-body">
            <h2 class="h5 mb-3">Registrar</h2>

            <div class="row g-3">
              <!-- Venta -->
              <div class="col-12">
                <h3 class="h6 text-uppercase text-secondary mb-2">Venta</h3>
                <form id="saleForm" class="row g-2 align-items-end">
                  <div class="col-12 col-md-7">
                    <label class="form-label text-secondary mb-1">Producto</label>
                    <select id="saleProduct" class="form-select form-select-sm" required></select>
                  </div>
                  <div class="col-6 col-md-3">
                    <label class="form-label text-secondary mb-1">Cantidad</label>
                    <input id="saleQty" class="form-control form-control-sm" type="number" min="1" step="1" value="1" required />
                  </div>
                  <div class="col-6 col-md-2 d-grid">
                    <button class="btn btn-sm btn-success" type="submit">Vender</button>
                  </div>
                </form>
              </div>

              <!-- Ingreso de mercadería -->
              <div class="col-12">
                <h3 class="h6 text-uppercase text-secondary mb-2">Ingreso de mercadería</h3>
                <form id="restockForm" class="row g-2 align-items-end">
                  <div class="col-12 col-md-7">
                    <label class="form-label text-secondary mb-1">Producto</label>
                    <select id="restockProduct" class="form-select form-select-sm" required></select>
                  </div>
                  <div class="col-6 col-md-3">
                    <label class="form-label text-secondary mb-1">Cantidad</label>
                    <input id="restockQty" class="form-control form-control-sm" type="number" min="1" step="1" value="1" required />
                  </div>
                  <div class="col-6 col-md-2 d-grid">
                    <button class="btn btn-sm btn-outline-light" type="submit">Sumar</button>
                  </div>
                </form>
              </div>
            </div>

            <hr class="border-secondary my-3" />

            <h3 class="h6 text-uppercase text-secondary">Ventas de hoy</h3>
            <div class="table-responsive">
              <table class="table table-dark table-sm mb-0">
                <thead>
                  <tr>
                    <th>Hora</th>
                    <th>Producto</th>
                    <th class="text-end">Cant.</th>
                    <th class="text-end">Total</th>
                  </tr>
                </thead>
                <tbody id="salesTbody"></tbody>
              </table>
            </div>

            <div class="d-flex gap-2 flex-wrap mt-3">
              <button id="btnExportCSV" class="btn btn-sm btn-outline-light" type="button">Exportar ventas (CSV)</button>
            </div>

          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
